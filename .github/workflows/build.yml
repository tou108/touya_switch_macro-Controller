name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: APKをビルドする
    runs-on: ubuntu-latest

    steps:
      # 1. コードをチェックアウト
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # 2. Java 17 セットアップ
      - name: Java 17 セットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 8.7 を直接インストール（wrapper.jarが不要になる）
      - name: Gradle 8.7 セットアップ
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # 4. Gradle キャッシュ
      - name: Gradle キャッシュ
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # 5. Debug APK をビルド（gradlew ではなく gradle コマンドを直接使用）
      - name: Debug APK をビルド
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: android-app

      # 6. APK をアーティファクトとして保存
      - name: APK をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: nx_switch_macro_debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 7. タグ付きpushのとき自動でGitHub Releaseを作成
      - name: GitHub Release を作成
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/debug/*.apk
          name: nx_switch_マクロ ${{ github.ref_name }}
          body: |
            ## インストール方法
            1. `nx_switch_macro_debug.apk` をダウンロード
            2. Androidの「提供元不明のアプリ」を許可
            3. APKをタップしてインストール
