name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # ← Actionsタブに「手動実行」ボタンが出る

jobs:
  build:
    name: APKをビルドする
    runs-on: ubuntu-latest

    steps:
      # 1. コードをチェックアウト
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # 2. Java 17 セットアップ
      - name: Java 17 セットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. gradle-wrapper.jar をダウンロード（バイナリなのでGitに含められない）
      - name: gradle-wrapper.jar をダウンロード
        run: |
          mkdir -p android-app/gradle/wrapper
          curl -fsSL -o android-app/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      # 4. gradlew に実行権限を付与
      - name: gradlew に実行権限を付与
        run: chmod +x android-app/gradlew

      # 5. Gradle キャッシュ（2回目以降を高速化）
      - name: Gradle キャッシュ
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # 6. Debug APK をビルド
      - name: Debug APK をビルド
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android-app

      # 7. APK をアーティファクトとして保存（Actionsページからダウンロード可能）
      - name: APK をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: nx_switch_macro_debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 8. タグ付きpushのとき自動でGitHub Releaseを作成
      - name: GitHub Release を作成
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/debug/*.apk
          name: nx_switch_マクロ ${{ github.ref_name }}
          body: |
            ## インストール方法
            1. `nx_switch_macro_debug.apk` をダウンロード
            2. Androidの「提供元不明のアプリ」を許可
            3. APKをタップしてインストール
