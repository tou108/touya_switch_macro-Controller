name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ① リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # ② Java 17 セットアップ（Android Gradle Plugin 8.x の要件）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ③ Gradle キャッシュ（ビルド高速化）
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ④ gradlew に実行権限を付与
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ⑤ Gradle Wrapper JAR を確実に生成（存在しない or 10KB未満なら再生成）
      - name: Generate Gradle Wrapper JAR
        run: |
          JAR_PATH="gradle/wrapper/gradle-wrapper.jar"
          JAR_SIZE=$(stat -c%s "$JAR_PATH" 2>/dev/null || echo 0)
          if [ ! -f "$JAR_PATH" ] || [ "$JAR_SIZE" -lt 10000 ]; then
            echo "gradle-wrapper.jar が見つからないか不正です（サイズ: ${JAR_SIZE} bytes）。再生成します..."
            curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
            echo "gradle-wrapper.jar を生成しました（$(stat -c%s "$JAR_PATH") bytes）"
          else
            echo "gradle-wrapper.jar は正常です（${JAR_SIZE} bytes）"
          fi

      # ⑥ Debug APK をビルド
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ⑦ APK を Artifacts としてアップロード
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MhxxSnipe-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ⑧ Release APK（署名なし）もビルド
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: MhxxSnipe-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
